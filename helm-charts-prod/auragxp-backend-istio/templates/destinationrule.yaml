{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: {{ .Values.appName }}-dr
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  host: auragxp-backend
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL  # Changed from DISABLE
    loadBalancer:
      simple: LEAST_CONN
    connectionPool:
      tcp:
        maxConnections: 1000
      http:
        http1MaxPendingRequests: 100
        maxRequestsPerConnection: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 10
  subsets:  # Add this entire section
  - name: v1
    labels:
      version: v1
  ports:
    - number: {{ .Values.service.port }}
      name: http
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: auragxp-db-rw-mtls-disabled
  namespace: {{ .Values.namespace }}
spec:
  host: auragxp-db-cluster-rw.auragxp-db.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
{{- end }}
