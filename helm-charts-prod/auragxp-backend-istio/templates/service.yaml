apiVersion: v1
kind: Service
metadata:
  name: auragxp-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: auragxp-backend
spec:
  type: ClusterIP
  selector:
    app: auragxp-backend
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP

