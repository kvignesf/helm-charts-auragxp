apiVersion: v1
kind: Service
metadata:
  name: auragxp-frontend
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    app: auragxp-frontend
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: auragxp-frontend
