{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.networkPolicy.name }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: auragxp-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from Istio Ingress Gateway
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aks-istio-ingress
          podSelector:
            matchLabels:
              app: aks-istio-ingressgateway-external
      ports:
        - protocol: TCP
          port: 3000
    # Allow traffic from auth-proxy
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth-proxy
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow external HTTPS calls (Key Vault/Azure APIs)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # Allow Istio Control Plane (XDS) - CRITICAL FOR SIDECAR
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aks-istio-system
      ports:
        - protocol: TCP
          port: 15012
    # Allow Frontend to talk to Backend
    - to:
        - podSelector:
            matchLabels:
              app: {{ .Values.backendAppName | default "auragxp-backend" }}
      ports:
        - protocol: TCP
          port: {{ .Values.backendPort | default 3901 }}
{{- end }}
