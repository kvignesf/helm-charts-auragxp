apiVersion: apps/v1
kind: Deployment
metadata:
  name: auragxp-frontend
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    app: auragxp-frontend
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: auragxp-frontend
  template:
    metadata:
      labels:
        app: auragxp-frontend
        version: v1
      annotations:
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: externalsecretoperator-serviceaccount

      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0

      # ===== ADDED: Anti-affinity for high availability =====
      affinity:
        # Prevent pods from scheduling on same node
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - auragxp-frontend
              topologyKey: kubernetes.io/hostname
        
        # Spread across failure domains
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - auragxp-frontend
              topologyKey: topology.kubernetes.io/region

      # ===== ADDED: Topology spread constraints =====
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: auragxp-frontend
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: auragxp-frontend

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      containers:
        - name: auragxp-frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          envFrom:
            - secretRef:
                name: {{ .Values.csiKeyVault.syncedK8sSecretName | default "kv-auraprod-esu" }}

          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true

          # ===== UPDATED: Resources based on actual usage =====
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # ===== IMPROVED: Probes with better settings =====
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          # ===== ADDED: Startup probe for Next.js apps =====
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30

          # ===== ADDED: Environment variables for Next.js =====
          env:
            - name: NODE_ENV
              value: "prod"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: HOSTNAME
              value: "0.0.0.0"

      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.csiKeyVault.secretProviderClassName | default "auragxp-azure-keyvault-prod" }}
      
      # ===== ADDED: Graceful termination =====
      terminationGracePeriodSeconds: 60
