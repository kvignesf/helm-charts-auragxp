replicaCount: 2

image:
  repository: acrauragxpappsprodesu.azurecr.io/support
  tag: "$SUPPORT_COMMIT"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  requests:
    cpu: 25m
    memory: 128Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: 200m
    memory: 256Mi
    ephemeral-storage: 500Mi

namespace: auragxp-prod

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70

podAntiAffinity:
  enabled: true


appName: auragxp-support

istio:
  enabled: true

