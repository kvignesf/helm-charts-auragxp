apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auragxp-support-network-policy
  namespace: auragxp-prod
spec:
  podSelector:
    matchLabels:
      app: auragxp-support
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aks-istio-ingress
          podSelector:
            matchLabels:
              app: aks-istio-ingressgateway-external
      ports:
        - protocol: TCP
          port: 80
    # Allow traffic from auth-proxy
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth-proxy
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
