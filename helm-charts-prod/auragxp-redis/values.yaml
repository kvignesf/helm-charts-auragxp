redis:
  networkPolicy:
    enabled: false

  architecture: replication

  auth:
    enabled: true
    existingSecret: auragxp-redis-auth
    existingSecretPasswordKey: redis-password

  master:
    persistence:
      enabled: true
      size: 8Gi
      accessModes:
        - ReadWriteOnce

    service:
      type: LoadBalancer
      ports:
        redis: 6379
      loadBalancerSourceRanges:
        - "52.255.207.143/32"
        - "52.255.207.145/32"
        - "13.72.72.20/32"
        - "52.255.207.144/32"
        - "52.255.207.146/32"
        - "191.237.27.74/32"
        - "40.121.16.193/32"
        - "130.107.72.103/32"
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-internal: "false"
        service.beta.kubernetes.io/azure-load-balancer-health-probe-protocol: "tcp"

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi

    extraVolumes:
      - name: redis-secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: auragxp-redis-keyvault

    extraVolumeMounts:
      - name: redis-secrets-store
        mountPath: "/mnt/secrets-store"
        readOnly: true

  replica:
    replicaCount: 1

    persistence:
      enabled: true
      size: 8Gi
      accessModes:
        - ReadWriteOnce

    service:
      type: ClusterIP    # Changed from LoadBalancer to ClusterIP
      ports:
        redis: 6379

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi

    extraVolumes:
      - name: redis-secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: auragxp-redis-keyvault

    extraVolumeMounts:
      - name: redis-secrets-store
        mountPath: "/mnt/secrets-store"
        readOnly: true

  metrics:
    enabled: false

  sentinel:
    enabled: false

  cluster:
    enabled: false
