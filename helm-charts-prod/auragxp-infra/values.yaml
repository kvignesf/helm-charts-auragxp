# Namespace Configuration
namespace: auragxp-prod

# Service Account Configuration
serviceAccount:
  create: true
  name: externalsecretoperator-serviceaccount
  clientId: 5b2a0f44-83bf-4034-b0a9-ea002cadd130
  tenantId: 788f6d9e-1a66-4385-9aee-01da8900e00b

# Istio
istio:
  gatewayName: auragxp-istio-gateway
  hostname: auragxp.auratrace.ai
  tlsSecretName: auragxp.auratrace.ai-tls-secret

# Network Policy
networkPolicy:
  enabled: true
  defaultDenyName: default-deny-all
  dnsName: allow-dns
  acmeEnabled: true
  acmeName: "allow-acme-challenge"
  istioNamespace: "aks-istio-ingress"
  keycloakOperatorName: "allow-keycloak-operator"
  keycloakDbAccessName: "allow-keycloak-db-access"
  keycloakDnsName: "allow-keycloak-dns"

# ============ ADD THIS NEW SECTION ============
# CSI Driver Configuration for Azure Key Vault
csiKeyVault:
  enabled: true
  secretProviderClassName: "auragxp-azure-keyvault-prod"
  syncedK8sSecretName: "kv-auraprod-esu"
  
  # Key Vault connection details
  vaultName: "kv-auraprod-esu"
  vaultUrl: "https://kv-auraprod-esu.vault.azure.net/"
  tenantId: "788f6d9e-1a66-4385-9aee-01da8900e00b"
  
  # Workload Identity details
  clientId: "5b2a0f44-83bf-4034-b0a9-ea002cadd130"
  
  # ALL secrets from your inventory (35+ secrets)
