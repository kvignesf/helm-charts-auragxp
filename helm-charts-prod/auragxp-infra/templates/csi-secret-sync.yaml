{{- if .Values.csiKeyVault.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "auragxp-infra.fullname" . }}-csi-test
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "auragxp-infra.labels" . | nindent 4 }}
spec:
  serviceAccountName: {{ .Values.serviceAccount.name }}
  restartPolicy: Never
  containers:
  - name: test
    image: busybox:latest
    command: ["sh", "-c", "echo 'Testing CSI mount...' && sleep 30 && echo 'Listing /mnt/secrets:' && ls -la /mnt/secrets/"]
    volumeMounts:
    - name: secrets-store-inline
      mountPath: "/mnt/secrets"
      readOnly: true
  volumes:
  - name: secrets-store-inline
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: {{ .Values.csiKeyVault.secretProviderClassName }}
{{- end }}
