apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: auragxp.auratrace.ai-tls-v2
  namespace: aks-istio-ingress        # ← primary namespace
  annotations:
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "auragxp-prod"
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
spec:
  secretName: auragxp.auratrace.ai-tls-secret
  commonName: auragxp.auratrace.ai
  dnsNames:
  - auragxp.auratrace.ai
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
