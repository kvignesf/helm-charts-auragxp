trigger: none

parameters:
  - name: environment
    displayName: 'Environment'
    type: string
    default: 'prod'
    values:
      - dev
      - uat
      - prod
  - name: action
    displayName: 'Action'
    type: string
    default: 'install'
    values:
      - install
      - upgrade

resources:
  repositories:
    - repository: auragxp_platform
      type: git
      name: auragxp-platform/qmslms_phase1
      ref: main
      endpoint: auragxp-platform-sc

pool:
    name: 'Azure-Self-Hosted2'

variables:
  # Dynamic variable group selection based on environment
  - ${{ if eq(parameters.environment, 'dev') }}:
    - group: 'db-dev-watershed'
  - ${{ if eq(parameters.environment, 'uat') }}:
    - group: 'db-uat-watershed'
  - ${{ if eq(parameters.environment, 'prod') }}:
    - group: 'db-prod-watershed'
  

stages:
  - stage: WhitelistAgentIP
    displayName: 'Whitelist Self-Hosted Agent IP in AKS'
    jobs:
      - job: UpdateAKSWhitelist
        displayName: 'Update AKS Network Policies & API Server'
        steps:
          - task: AzureCLI@2
            displayName: 'Whitelist Agent IP in AKS Authorized Ranges'
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                AGENT_IP=$(curl -s https://api.ipify.org)
                echo "Detected Agent IP: $AGENT_IP"
                echo "##vso[task.setvariable variable=AGENT_IP;isOutput=true]$AGENT_IP"

                EXISTING_RANGES=$(az aks show \
                  --resource-group "$(AKS_RG)" \
                  --name "$(AKS_NAME)" \
                  --query "apiServerAccessProfile.authorizedIpRanges | join(',', @)" \
                  -o tsv || echo "")

                if [[ "$EXISTING_RANGES" != *"$AGENT_IP"* ]]; then
                  if [ -n "$EXISTING_RANGES" ]; then
                    NEW_RANGES="${EXISTING_RANGES},${AGENT_IP}"
                  else
                    NEW_RANGES="${AGENT_IP}"
                  fi
                  
                  echo "Updating AKS authorized IP ranges to include $AGENT_IP..."
                  az aks update \
                    --resource-group "$(AKS_RG)" \
                    --name "$(AKS_NAME)" \
                    --api-server-authorized-ip-ranges "$NEW_RANGES"
                  
                  echo "Waiting for firewall propagation..."
                  sleep 60
                else
                  echo "Agent IP is already whitelisted."
                fi
            name: AzureWhitelist

  - stage: ConnectToAKS
    displayName: 'Connect to AKS Cluster'
    dependsOn: WhitelistAgentIP
    condition: succeeded()
    jobs:
      - job: GetAKSCredentials
        displayName: 'Download AKS Credentials'
        steps:
          - task: AzureCLI@2
            displayName: 'Connect to AKS Cluster'
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                
                echo "========================================="
                echo "Connecting to AKS Cluster - Environment: ${{ parameters.environment }}"
                echo "========================================="
                
                # Get AKS credentials
                az aks get-credentials \
                  --resource-group "$(AKS_RG)" \
                  --name "$(AKS_NAME)" \
                  --overwrite-existing
                
                kubelogin convert-kubeconfig -l azurecli  
                
                echo "Verifying cluster connectivity..."
                kubectl get nodes
                
                echo "Successfully connected to AKS cluster: $(AKS_NAME)"

  - stage: VerifyClusterContext
    displayName: 'Verify Cluster Context'
    dependsOn: ConnectToAKS
    condition: succeeded()
    jobs:
      - job: ClusterVerification
        displayName: 'Verify Correct AKS and Database Cluster'
        steps:
          - task: AzureCLI@2
            displayName: 'Verify cluster context'
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                
                echo "========================================="
                echo "Verifying AKS Cluster Context - ${{ parameters.environment }}"
                echo "========================================="
                
                az aks get-credentials \
                  --resource-group "$(AKS_RG)" \
                  --name "$(AKS_NAME)" \
                  --overwrite-existing
                
                kubelogin convert-kubeconfig -l azurecli
                
                echo ""
                echo "========================================="
                echo "Verifying Database Connectivity"
                echo "========================================="
                
                POD_NAME="$(k8s.pod)"
                NAMESPACE="$(k8s.namespace)"
                
                echo "Pod Name: $POD_NAME"
                echo "Namespace: $NAMESPACE"
                echo "Environment: ${{ parameters.environment }}"
                
                echo "Verifying pod access..."
                kubectl get pod $POD_NAME -n $NAMESPACE || {
                  echo "ERROR: Cannot access pod $POD_NAME"
                  exit 1
                }
                
                echo "Testing database connection..."
                kubectl exec $POD_NAME -n $NAMESPACE -- env \
                  DB_PASSWORD='$(db.postgres.password)' \
                  DB_USER='postgres' \
                  bash -c '
                    export PGPASSWORD="$DB_PASSWORD"
                    psql -h localhost -U "$DB_USER" -d postgres -c "SELECT 1"
                  '
                
                if [ $? -eq 0 ]; then
                  echo "Database connection successful"
                else
                  echo "Database connection failed"
                  exit 1
                fi
                
                echo ""
                echo "========================================="
                echo "ALL CLUSTER VERIFICATIONS PASSED"
                echo "========================================="
                echo "Environment: ${{ parameters.environment }}"
                echo "AKS Cluster: $CURRENT_AKS_NAME"
                echo "Pod: $POD_NAME"
                echo "Namespace: $NAMESPACE"
                echo "========================================="

  - stage: PrimaryDatabaseInitialSetup
    displayName: 'Initial Database Setup (Keycloak DB & Users)'
    dependsOn: VerifyClusterContext
    condition: succeeded()
    jobs:
      - job: CreateInitialDatabaseObjects
        displayName: 'Create Keycloak Database and Additional Users'
        steps:
          - checkout: auragxp_platform
            path: s/auragxp_platform
          
          - task: AzureCLI@2
            displayName: 'Authenticate and setup database'
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                
                echo "========================================="
                echo "Initial Database Setup for ${{ parameters.environment }}"
                echo "========================================="
                
                az aks get-credentials \
                  --resource-group "$(AKS_RG)" \
                  --name "$(AKS_NAME)" \
                  --overwrite-existing
                
                kubelogin convert-kubeconfig -l azurecli 
                
                POD_NAME="$(k8s.pod)"
                NAMESPACE="$(k8s.namespace)"
                
                echo "Pod Name: $POD_NAME"
                echo "Namespace: $NAMESPACE"
                echo "Environment: ${{ parameters.environment }}"
                
                kubectl get pod $POD_NAME -n $NAMESPACE || {
                  echo "ERROR: Cannot access pod $POD_NAME"
                  exit 1
                }
                
                echo "PostgreSQL pod found: $POD_NAME"
                
                echo "========================================="
                echo "Creating Initial Setup SQL Script from Template"
                echo "========================================="
                
                TEMPLATE_FILE="$(System.DefaultWorkingDirectory)/apps/artefacts/dbdeploy/initial_setup.sql.template"
                
                if [ ! -f "$TEMPLATE_FILE" ]; then
                  echo "ERROR: Template file not found: $TEMPLATE_FILE"
                  exit 1
                fi
                
                export DB_APP_USER="$(db.app.user)"
                export DB_APP_PASSWORD="$(db.app.password)"
                export DB_KC_USER="$(db.kc.user)"
                export DB_KC_PASSWORD="$(db.kc.password)"
                export DB_KC_NAME="$(db.kc.name)"
                export DB_NAME="$(db.name)"
                
                envsubst < "$TEMPLATE_FILE" > "$(Build.ArtifactStagingDirectory)/initial_setup.sql"
                
                echo "Initial setup SQL file created"
                
                echo "========================================="
                echo "Executing Initial Database Setup"
                echo "========================================="
                
                # Execute the SQL script
                cat "$(Build.ArtifactStagingDirectory)/initial_setup.sql" | \
                kubectl exec -i $POD_NAME -n $NAMESPACE -- env \
                  DB_USER='postgres' \
                  DB_PASSWORD='$(db.postgres.password)' \
                  bash -c '
                    export PGPASSWORD="$DB_PASSWORD"
                    psql -h localhost -U "$DB_USER" -d postgres
                  '
                
                if [ $? -eq 0 ]; then
                  echo "Initial database setup completed successfully for ${{ parameters.environment }}"
                else
                  echo "Initial database setup failed for ${{ parameters.environment }}"
                  exit 1
                fi
                
                echo "========================================="
                echo "Verifying Initial Database Setup"
                echo "========================================="
                
                echo "Checking users..."
                APP_USER_EXISTS=$(kubectl exec $POD_NAME -n $NAMESPACE -- env \
                  DB_USER='postgres' \
                  DB_PASSWORD='$(db.postgres.password)' \
                  APP_USER='$(db.app.user)' \
                  bash -c '
                    export PGPASSWORD="$DB_PASSWORD"
                    psql -h localhost -U "$DB_USER" -d postgres -tAc "SELECT EXISTS(SELECT 1 FROM pg_roles WHERE rolname = '\''$APP_USER'\'')"
                  ' 2>/dev/null | tr -d '[:space:]')
                
                KC_USER_EXISTS=$(kubectl exec $POD_NAME -n $NAMESPACE -- env \
                  DB_USER='postgres' \
                  DB_PASSWORD='$(db.postgres.password)' \
                  KC_USER='$(db.kc.user)' \
                  bash -c '
                    export PGPASSWORD="$DB_PASSWORD"
                    psql -h localhost -U "$DB_USER" -d postgres -tAc "SELECT EXISTS(SELECT 1 FROM pg_roles WHERE rolname = '\''$KC_USER'\'')"
                  ' 2>/dev/null | tr -d '[:space:]')
                
                if [ "$APP_USER_EXISTS" = "t" ]; then
                  echo "App user '$(db.app.user)' exists"
                else
                  echo "App user '$(db.app.user)' not found"
                  exit 1
                fi
                
                if [ "$KC_USER_EXISTS" = "t" ]; then
                  echo "Keycloak user '$(db.kc.user)' exists"
                else
                  echo "Keycloak user '$(db.kc.user)' not found"
                  exit 1
                fi
                
                echo "Checking databases..."
                KC_DB_EXISTS=$(kubectl exec $POD_NAME -n $NAMESPACE -- env \
                  DB_USER='postgres' \
                  DB_PASSWORD='$(db.postgres.password)' \
                  KC_NAME='$(db.kc.name)' \
                  bash -c '
                    export PGPASSWORD="$DB_PASSWORD"
                    psql -h localhost -U "$DB_USER" -d postgres -tAc "SELECT EXISTS(SELECT 1 FROM pg_database WHERE datname = '\''$KC_NAME'\'')"
                  ' 2>/dev/null | tr -d '[:space:]')
                
                if [ "$KC_DB_EXISTS" = "t" ]; then
                  echo "Keycloak database '$(db.kc.name)' exists"
                else
                  echo "Keycloak database '$(db.kc.name)' not found"
                  exit 1
                fi
                
                echo "========================================="
                echo "Initial setup verification successful for ${{ parameters.environment }}"
                echo "========================================="

  - stage: PrepareEnvironment
    displayName: 'Prepare Environment for Primary Setup'
    dependsOn: PrimaryDatabaseInitialSetup
    condition: succeeded()
    jobs:
      - job: CreateEnvFile
        displayName: 'Create Environment Variables File'
        steps:
          - task: AzureCLI@2
            displayName: 'Prepare environment'
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e

                echo "========================================="
                echo "Preparing Environment for ${{ parameters.environment }}"
                echo "========================================="

                az aks get-credentials \
                  --resource-group "$(AKS_RG)" \
                  --name "$(AKS_NAME)" \
                  --overwrite-existing

                kubelogin convert-kubeconfig -l azurecli

                POD_NAME="$(k8s.pod)"
                NAMESPACE="$(k8s.namespace)"
                SQL_PATH="$(k8s.sql.path)"

                echo "Creating environment file directly inside pod for ${{ parameters.environment }}..."

                kubectl exec $POD_NAME -n $NAMESPACE -- /bin/bash -c "
                  mkdir -p $SQL_PATH
                  cat > $SQL_PATH/db_env.sh <<EOF
                #!/bin/bash
                export DB_HOST='127.0.0.1'
                export DB_USER='postgres'
                export DB_PASSWORD='$(db.postgres.password)'
                export DB_NAME='$(db.name)'
                export SCHEMA_NAME='$(db.schema.name)'
                export SCHEMA_OWNER='$(db.schema.owner)'
                export APP_USER='$(db.app.user)'
                export BOOTSTRAP_ADMIN_USERNAME='$(bootstrap.admin.username)'
                export BOOTSTRAP_ADMIN_EMAIL='$(bootstrap.admin.email)'
                export BOOTSTRAP_ADMIN_ORG_NAME='$(bootstrap.admin.org.name)'
                export ORG_NAME='$(org.name)'
                export ORG_CODE='$(org.code)'
                export ORG_EMAIL_CONTACT='$(org.email.contact)'
                export SHAREPOINT_DRIVEID='$(sharepoint.driveid)'
                export GEO_NAME='$(geo.name)'
                export ORG_TYPE_NAME='$(org.type.name)'
                export ADM_USER_NAME='$(adm.user.name)'
                export ADM_EMAIL='$(adm.email)'
                export ADM_FNAME='$(adm.fname)'
                export ADM_LNAME='$(adm.lname)'
                export DEPT_NAME='$(dept.name)'
                EOF
                  chmod +x $SQL_PATH/db_env.sh
                "

                echo "Environment file created successfully inside pod for ${{ parameters.environment }}"

  - stage: PrimaryDatabaseSetup
    displayName: 'Execute Primary Database Setup'
    dependsOn: PrepareEnvironment
    condition: succeeded()
    jobs:
      - job: DeployPrimaryDB
        displayName: 'Deploy Primary Database'
        steps:
          - checkout: auragxp_platform
            path: s/auragxp_platform
          
          - task: AzureCLI@2
            displayName: 'Execute database setup'
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                
                echo "========================================="
                echo "Primary Database Setup for ${{ parameters.environment }}"
                echo "========================================="
                
                az aks get-credentials \
                  --resource-group "$(AKS_RG)" \
                  --name "$(AKS_NAME)" \
                  --overwrite-existing
                
                kubelogin convert-kubeconfig -l azurecli
                
                POD_NAME="$(k8s.pod)"
                NAMESPACE="$(k8s.namespace)"
                SQL_PATH="$(k8s.sql.path)"
                
                echo "========================================="
                echo "Copying Database Deployment Files to Pod"
                echo "========================================="
                
                cd $(System.DefaultWorkingDirectory)/apps/artefacts/dbdeploy
                
                kubectl cp run_common_dbsetup.sh $POD_NAME:$SQL_PATH/ -n $NAMESPACE
                echo "Copied: run_common_dbsetup.sh"
                
                for sql_file in *.sql; do
                  if [ -f "$sql_file" ]; then
                    kubectl cp "$sql_file" $POD_NAME:$SQL_PATH/ -n $NAMESPACE
                    echo "Copied: $sql_file"
                  fi
                done
                
                kubectl exec $POD_NAME -n $NAMESPACE -- chmod +x $SQL_PATH/run_common_dbsetup.sh
                
                echo "Database deployment files copied successfully"
                
                echo "========================================="
                echo "Executing Primary Database Setup for ${{ parameters.environment }}"
                echo "========================================="
                
                if kubectl exec $POD_NAME -n $NAMESPACE -- /bin/bash -c "source $SQL_PATH/db_env.sh && cd $SQL_PATH && ./run_common_dbsetup.sh"; then
                  echo "Primary database setup executed successfully for ${{ parameters.environment }}"
                else
                  echo "Primary database setup failed for ${{ parameters.environment }}"
                  exit 1
                fi