# Default values for keycloak-operator
namespace: watershed-keycloak

replicaCount: 1

azure:
  clientId: "5b2a0f44-83bf-4034-b0a9-ea002cadd130"

image:
  repository: quay.io/keycloak/keycloak-operator
  tag: 26.4.7
  pullPolicy: IfNotPresent

serviceAccount:
  name: keycloak-operator2
  create: true

# RBAC configuration
rbac:
  create: true
  clusterRoleName: keycloak-operator2
  clusterRoleBindingName: keycloak-operator2

# Watch namespace configuration
watchNamespace: watershed-keycloak
operatorName: keycloak-operator2

# Resource limits and requests
resources:
  requests:
    cpu: 50m
    memory: 384Mi
  limits:
    cpu: 200m
    memory: 512Mi

# Additional environment variables
extraEnv: []

# Pod annotations
podAnnotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
