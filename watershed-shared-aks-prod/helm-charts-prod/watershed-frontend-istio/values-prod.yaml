# Application configuration
replicaCount: 2

image:
  repository: acrauragxpappsprodesu.azurecr.io/watershed/frontend
  tag: watershed-v1.1-June2026
  pullPolicy: Always
  pullSecrets: []

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000
  name: http

resources:
  requests:
    cpu: 50m
    memory: 256Mi
    ephemeral-storage: 500Mi
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 1Gi

nodeSelector:
  watershed/deploy: application

namespace: watershed-prod
environment: prod

# Istio Configuration
istio:
  enabled: true
  host: watershed.auratrace.ai
  gateway: auragxp-prod/auragxp-istio-gateway
  serviceName: watershed-frontend
  sidecarInjection: true
  holdApplicationUntilProxyStarts: true
  proxyConfig: '{"holdApplicationUntilProxyStarts": true}'
  # DestinationRule configuration
  connectionPool:
    tcp:
      maxConnections: 100
      connectTimeout: 30s
    http:
      http1MaxPendingRequests: 50
      http2MaxRequests: 100
      maxRequestsPerConnection: 10
      maxRetries: 3
  loadBalancer:
    simple: ROUND_ROBIN
  outlierDetection:
    consecutive5xxErrors: 5
    interval: 30s
    baseEjectionTime: 30s
    maxEjectionPercent: 100
  subsets:
    - name: v1
      labels:
        version: v1

# Pod annotations
podAnnotations:
  sidecar.istio.io/inject: "true"
  proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

appName: watershed-frontend
backendAppName: watershed-backend
keycloakAppName: keycloak

backendPort: 3901
keycloakPort: 8080

# CSI Driver Configuration for Azure Key Vault
csiKeyVault:
  enabled: true
  secretProviderClassName: "watershed-frontend-kv-prod"
  syncedK8sSecretName: "watershed-frontend-secrets-prod"
  vaultName: "kv-watershed-esu"
  vaultUrl: "https://kv-watershed-esu.vault.azure.net/"
  tenantId: "788f6d9e-1a66-4385-9aee-01da8900e00b"
  clientId: "5b2a0f44-83bf-4034-b0a9-ea002cadd130"
  driverName: secrets-store.csi.k8s.io
  mountPath: "/mnt/secrets-store"
  # Frontend specific secrets
  objects:
    array:
      - objectName: "NEXTAUTH-SECRET"
        objectType: secret
      - objectName: "KEYCLOAK-CLIENT-SECRET"
        objectType: secret

# Autoscaling configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max

# Pod Anti-Affinity configuration
podAntiAffinity:
  enabled: true
  preferredDuringScheduling: true
  weight: 100
  topologyKey: kubernetes.io/hostname

# Pod Affinity configuration
podAffinity:
  enabled: true
  preferredDuringScheduling: true
  weight: 50
  topologyKey: topology.kubernetes.io/region

# Topology spread constraints
topologySpreadConstraints:
  enabled: true
  constraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway

# Network Policy configuration
networkPolicy:
  enabled: true
  name: watershed-frontend-network-policy
  ingress:
    fromIstioGateway:
      enabled: true
      gatewayNamespace: auragxp-prod
      gatewayLabelSelector:
        app: aks-istio-ingressgateway-external
      port: 3000
    fromAuthProxy:
      enabled: true
      authProxyLabelSelector:
        app.kubernetes.io/name: auth-proxy
      port: 3000
  egress:
    toDNS:
      enabled: true
      dnsNamespace: kube-system
      dnsLabelSelector:
        k8s-app: kube-dns
      dnsPorts:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    toExternalHTTPS:
      enabled: true
      externalCIDR: 0.0.0.0/0
      httpsPort: 443
    toIstioControlPlane:
      enabled: true
      istioNamespaces:
        - istio-system
        - aks-istio-system
      xdsPort: 15012
    toBackend:
      enabled: true
      backendLabelSelector:
        app: watershed-backend
      backendPort: 3901

# Probe configuration
probes:
  livenessProbe:
    enabled: true
    type: tcpSocket
    port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    type: tcpSocket
    port: 3000
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 3
  startupProbe:
    enabled: true
    type: tcpSocket
    port: 3000
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 30

# Deployment strategy
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Service account
serviceAccount:
  name: watershed-serviceaccount
  create: false

# Environment variables
env:
  - name: NODE_ENV
    value: "prod"
  - name: NEXT_TELEMETRY_DISABLED
    value: "1"
  - name: HOSTNAME
    value: "0.0.0.0"

# Termination grace period
terminationGracePeriodSeconds: 60

# Tolerations
tolerations: []

# Additional labels and annotations
deploymentLabels: {}
deploymentAnnotations: {}
podLabels:
  version: v1

# HTTP Route (disabled when using Istio VirtualService)
httpRoute:
  enabled: false

ingress:
  enabled: false
