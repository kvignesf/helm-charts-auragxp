{{- if .Values.csiKeyVault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.csiKeyVault.frontendSecretProviderClassName }}
  namespace: {{ .Values.namespace }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.csiKeyVault.clientId }}
    keyvaultName: {{ .Values.csiKeyVault.vaultName }}
    cloudName: AzurePublicCloud
    tenantId: {{ .Values.csiKeyVault.tenantId }}
    objects: |-
      array:
{{- range .Values.csiKeyVault.frontendObjects.array }}
        - |
          objectName: {{ .objectName }}
          objectType: {{ .objectType }}
{{- end }}

  secretObjects:
    - secretName: {{ .Values.csiKeyVault.frontendSyncedSecretName }}
      type: Opaque
      data:
        - key: NEXTAUTH_URL
          objectName: NEXTAUTH-URL
        - key: NEXTAUTH_SECRET
          objectName: NEXTAUTH-SECRET
        - key: KEYCLOAK_ISSUER
          objectName: KEYCLOAK-ISSUER
        - key: KEYCLOAK_CLIENT_ID
          objectName: KEYCLOAK-CLIENT-ID
        - key: KEYCLOAK_CLIENT_SECRET
          objectName: KEYCLOAK-CLIENT-SECRET
{{- end }}
