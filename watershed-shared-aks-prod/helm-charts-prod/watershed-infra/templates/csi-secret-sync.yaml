{{- if .Values.csiKeyVault.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "watershed-infra.fullname" . }}-csi-test
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "watershed-infra.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "watershed-infra.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      restartPolicy: Never
      containers:
      - name: csi-test
        image: busybox:latest
        imagePullPolicy: IfNotPresent
        command:
          - sh
          - -c
          - |
            echo "Testing CSI Secret Provider Class mount..."
            if [ -d "/mnt/secrets" ]; then
              ls -la /mnt/secrets/
              if [ -f "/mnt/secrets/PORT" ]; then
                echo "✓ CSI secrets mounted successfully"
                exit 0
              else
                echo "✗ Secrets not found in mount"
                exit 1
              fi
            else
              echo "✗ Mount point /mnt/secrets does not exist"
              exit 1
            fi
        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/mnt/secrets"
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: {{ .Values.csiKeyVault.secretProviderClassName }}
{{- end }}
