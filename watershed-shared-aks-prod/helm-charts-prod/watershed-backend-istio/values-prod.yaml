# Application configuration
replicaCount: 2

image:
  repository: acrauragxpappsprodesu.azurecr.io/watershed/backend
  tag: watershed-v1.1-June2026
  pullPolicy: Always
  pullSecrets: []

resources:
  requests:
    cpu: 50m
    memory: 256Mi
    ephemeral-storage: 1Gi
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 1Gi

nodeSelector:
  watershed/deploy: application

service:
  type: ClusterIP
  port: 3901
  targetPort: 3901
  name: http

secrets:
  name: kv-watershed-esu

# Network Policy configuration
networkPolicy:
  enabled: true
  name: backend-istio-network-policy
  ingress:
    fromFrontend:
      enabled: true
      frontendLabelSelector:
        app: watershed-frontend
      port: 3901
    fromIstioGateway:
      enabled: true
      gatewayNamespace: auragxp-prod
      gatewayLabelSelector:
        app: aks-istio-ingressgateway-external
      port: 3901
  egress:
    toPostgres:
      enabled: true
      postgresNamespace: watershed-db
      postgresPort: 5432
    toRedis:
      enabled: true
      redisNamespace: watershed-db
      redisLabelSelector:
        app.kubernetes.io/instance: watershed-redis
        app.kubernetes.io/name: redis
      redisPort: 6379
    toDNS:
      enabled: true
      dnsNamespace: kube-system
      dnsLabelSelector:
        k8s-app: kube-dns
      dnsPorts:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    toExternalHTTPS:
      enabled: true
      externalCIDR: 0.0.0.0/0
      httpsPort: 443
    toIstioControlPlane:
      enabled: true
      istioNamespaces:
        - istio-system
        - aks-istio-system
      xdsPort: 15012
    toKeycloak:
      enabled: true
      keycloakNamespace: watershed-keycloak
      keycloakLabelSelector:
        app.kubernetes.io/managed-by: keycloak-operator2
      keycloakPort: 8080

namespace: watershed-prod
appName: watershed-backend
frontendAppName: watershed-frontend
dbPort: 5432

# Autoscaling configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max

# Pod Anti-Affinity configuration
podAntiAffinity:
  enabled: true
  preferredDuringScheduling: true
  requiredDuringScheduling: false
  weight: 100
  topologyKey: kubernetes.io/hostname

# Pod Affinity configuration
podAffinity:
  enabled: true
  preferredDuringScheduling: true
  weight: 50
  topologyKey: topology.kubernetes.io/zone

# Topology spread constraints
topologySpreadConstraints:
  enabled: true
  constraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway

# Istio configuration
istio:
  enabled: true
  host: watershed.auratrace.ai
  gatewayName: auragxp-prod/auragxp-istio-gateway
  serviceName: watershed-backend
  path: /api/
  tlsMode: ISTIO_MUTUAL
  loadBalancer:
    simple: LEAST_CONN
  connectionPool:
    tcp:
      maxConnections: 1000
    http:
      http1MaxPendingRequests: 100
      maxRequestsPerConnection: 100
  outlierDetection:
    consecutive5xxErrors: 5
    interval: 10s
    baseEjectionTime: 30s
    maxEjectionPercent: 10
  subsets:
    - name: v1
      labels:
        version: v1
  dbDestinationRule:
    enabled: true
    dbHost: watershed-db-cluster-rw.watershed-db.svc.cluster.local
    tlsMode: DISABLE

# Pod annotations
podAnnotations:
  sidecar.istio.io/inject: "true"
  proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
  prometheus.io/scrape: "true"
  prometheus.io/port: "3901"
  prometheus.io/path: "/metrics"

# Ingress (disabled when using Istio)
ingress:
  enabled: false

# CSI Driver Configuration for Azure Key Vault
csiKeyVault:
  enabled: true
  secretProviderClassName: "watershed-azure-keyvault-prod"
  syncedK8sSecretName: "kv-watershed-esu"
  vaultName: "kv-watershed-esu"
  vaultUrl: "https://kv-watershed-esu.vault.azure.net/"
  tenantId: "788f6d9e-1a66-4385-9aee-01da8900e00b"
  clientId: "5b2a0f44-83bf-4034-b0a9-ea002cadd130"
  driverName: secrets-store.csi.k8s.io
  mountPath: /mnt/secret
  objects:
    array:
      - objectName: "PORT"
        objectType: secret
      - objectName: "SP-ENV"
        objectType: secret
      - objectName: "DB-HOST"
        objectType: secret
      - objectName: "DB-PORT"
        objectType: secret
      - objectName: "DB-USER"
        objectType: secret
      - objectName: "DB-PASSWORD"
        objectType: secret
      - objectName: "DB-NAME"
        objectType: secret
      - objectName: "AZURE-TENANT-ID"
        objectType: secret
      - objectName: "AZURE-CLIENT-ID"
        objectType: secret
      - objectName: "AZURE-CLIENT-SECRET"
        objectType: secret
      - objectName: "AZURE-STORAGE-CONNECTION-STRING"
        objectType: secret
      - objectName: "SHAREPOINT-SITE-ID"
        objectType: secret
      - objectName: "SHAREPOINT-DRIVE-ID"
        objectType: secret
      - objectName: "BACKEND-KEYCLOAK-ISSUER"
        objectType: secret
      - objectName: "BACKEND-KEYCLOAK-CLIENT-ID"
        objectType: secret
      - objectName: "BACKEND-KEYCLOAK-CLIENT-SECRET"
        objectType: secret
      - objectName: "BACKEND-KEYCLOAK-REDIRECT-URI"
        objectType: secret
      - objectName: "BACKEND-KEYCLOAK-ADMIN-CLIENT-ID"
        objectType: secret
      - objectName: "BACKEND-KEYCLOAK-ADMIN-CLIENT-SECRET"
        objectType: secret
      - objectName: "BACKEND-KC-BASE-URL"
        objectType: secret
      - objectName: "BACKEND-KEYCLOAK-REALM"
        objectType: secret
      - objectName: "BACKEND-KEYCLOAK-AUDIENCE"
        objectType: secret
      - objectName: "BACKEND-KEYCLOAK-JWKS"
        objectType: secret
      - objectName: "LICENSE-SERVER-URL"
        objectType: secret
      - objectName: "LICENSE-CLIENT-ID"
        objectType: secret
      - objectName: "LICENSE-CLIENT-SECRET"
        objectType: secret
      - objectName: "KEYCLOAK-ADMIN"
        objectType: secret
      - objectName: "KEYCLOAK-ADMIN-PASSWORD"
        objectType: secret
      - objectName: "KC-DB-USERNAME"
        objectType: secret
      - objectName: "KC-DB-PASSWORD"
        objectType: secret
      - objectName: "COMMUNICATION-SERVICES-CONNECTION-STRING"
        objectType: secret
      - objectName: "ACS-SENDER-ADDRESS"
        objectType: secret
      - objectName: "DEV-URL"
        objectType: secret
      - objectName: "REDIS-PASSWORD"
        objectType: secret
      - objectName: "ORG-PROVISION-FUNCTION-URL"
        objectType: secret
      - objectName: "ORG-SCHEMA-VERSION"
        objectType: secret
      - objectName: "TEMP-PASSWORD"
        objectType: secret

# Environment variables
env:
  - name: NODE_ENV
    value: "prod"

# Database configuration
database:
  host: watershed-db-cluster-rw.watershed-db.svc.cluster.local
  port: "5432"
  redisHost: watershed-redis-master.watershed-db.svc.cluster.local
  redisPort: "6379"

# Probe configuration
probes:
  livenessProbe:
    enabled: true
    type: tcpSocket
    port: 3901
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    type: tcpSocket
    port: 3901
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 3
  startupProbe:
    enabled: true
    type: tcpSocket
    port: 3901
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 30

# Deployment strategy
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Service account
serviceAccount:
  name: watershed-serviceaccount
  create: false

# Termination grace period
terminationGracePeriodSeconds: 60

# Tolerations
tolerations: []

# Additional labels and annotations
deploymentLabels: {}
deploymentAnnotations: {}
podLabels: {}
