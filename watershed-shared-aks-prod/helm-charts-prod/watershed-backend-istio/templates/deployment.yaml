apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.appName }}
    {{- include "backend.labels" . | nindent 4 }}
  {{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.appName }}
  {{- if .Values.deploymentStrategy }}
  strategy:
    type: {{ .Values.deploymentStrategy.type }}
    {{- if .Values.deploymentStrategy.rollingUpdate }}
    rollingUpdate:
      maxSurge: {{ .Values.deploymentStrategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.deploymentStrategy.rollingUpdate.maxUnavailable }}
    {{- end }}
  {{- end }}
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "backend.serviceAccountName" . }}

      {{- if or .Values.podAntiAffinity.enabled .Values.podAffinity.enabled }}
      affinity:
        {{- if and .Values.podAntiAffinity.enabled }}
        podAntiAffinity:
          {{- if .Values.podAntiAffinity.preferredDuringScheduling }}
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: {{ .Values.podAntiAffinity.weight }}
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - {{ .Values.appName }}
              topologyKey: {{ .Values.podAntiAffinity.topologyKey }}
          {{- else if .Values.podAntiAffinity.requiredDuringScheduling }}
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - {{ .Values.appName }}
            topologyKey: {{ .Values.podAntiAffinity.topologyKey }}
          {{- end }}
        {{- end }}
        {{- if and .Values.podAffinity.enabled }}
        podAffinity:
          {{- if .Values.podAffinity.preferredDuringScheduling }}
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: {{ .Values.podAffinity.weight }}
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - {{ .Values.appName }}
              topologyKey: {{ .Values.podAffinity.topologyKey }}
          {{- end }}
        {{- end }}
      {{- end }}

      {{- if .Values.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        {{- range .Values.topologySpreadConstraints.constraints }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app: {{ $.Values.appName }}
        {{- end }}
      {{- end }}

      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: {{ .Values.appName }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          env:
            {{- toYaml .Values.env | nindent 12 }}
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: REDIS_HOST
              value: {{ .Values.database.redisHost | quote }}
            - name: REDIS_PORT
              value: {{ .Values.database.redisPort | quote }}

          envFrom:
            - secretRef:
                name: {{ .Values.csiKeyVault.syncedK8sSecretName }}

          volumeMounts:
            - name: secrets-store-inline
              mountPath: {{ .Values.csiKeyVault.mountPath }}
              readOnly: true

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          {{- if .Values.probes.livenessProbe.enabled }}
          livenessProbe:
            {{- if eq .Values.probes.livenessProbe.type "tcpSocket" }}
            tcpSocket:
              port: {{ .Values.probes.livenessProbe.port }}
            {{- else if eq .Values.probes.livenessProbe.type "httpGet" }}
            httpGet:
              path: {{ .Values.probes.livenessProbe.path | default "/health" }}
              port: {{ .Values.probes.livenessProbe.port }}
            {{- end }}
            initialDelaySeconds: {{ .Values.probes.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.livenessProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.probes.readinessProbe.enabled }}
          readinessProbe:
            {{- if eq .Values.probes.readinessProbe.type "tcpSocket" }}
            tcpSocket:
              port: {{ .Values.probes.readinessProbe.port }}
            {{- else if eq .Values.probes.readinessProbe.type "httpGet" }}
            httpGet:
              path: {{ .Values.probes.readinessProbe.path | default "/ready" }}
              port: {{ .Values.probes.readinessProbe.port }}
            {{- end }}
            initialDelaySeconds: {{ .Values.probes.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readinessProbe.timeoutSeconds }}
            successThreshold: {{ .Values.probes.readinessProbe.successThreshold }}
            failureThreshold: {{ .Values.probes.readinessProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.probes.startupProbe.enabled }}
          startupProbe:
            {{- if eq .Values.probes.startupProbe.type "tcpSocket" }}
            tcpSocket:
              port: {{ .Values.probes.startupProbe.port }}
            {{- else if eq .Values.probes.startupProbe.type "httpGet" }}
            httpGet:
              path: {{ .Values.probes.startupProbe.path | default "/startup" }}
              port: {{ .Values.probes.startupProbe.port }}
            {{- end }}
            initialDelaySeconds: {{ .Values.probes.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.probes.startupProbe.failureThreshold }}
          {{- end }}

      volumes:
        - name: secrets-store-inline
          csi:
            driver: {{ .Values.csiKeyVault.driverName }}
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.csiKeyVault.secretProviderClassName }}

      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
