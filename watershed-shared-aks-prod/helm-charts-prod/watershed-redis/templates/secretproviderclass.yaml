apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.csiKeyVault.secretProviderClassName }}
  namespace: {{ .Values.csiKeyVault.namespace | default .Values.namespace }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.csiKeyVault.clientId }}
    keyvaultName: {{ .Values.csiKeyVault.vaultName }}
    tenantId: {{ .Values.csiKeyVault.tenantId }}
    objects: |
      array:
{{- range .Values.csiKeyVault.objects.array }}
        - |
          objectName: {{ .objectName }}
          objectType: {{ .objectType }}
{{- end }}
  secretObjects:
    - secretName: {{ .Values.csiKeyVault.syncedK8sSecretName }}
      type: Opaque
      data:
{{- range .Values.csiKeyVault.objects.array }}
        - objectName: {{ .objectName }}
          key: redis-password
{{- end }}
