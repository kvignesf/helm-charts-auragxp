{{- if .Values.csiTestPod.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Values.csiTestPod.name }}
  namespace: {{ .Values.namespace }}
spec:
  serviceAccountName: {{ .Values.serviceAccount.name }}
  containers:
    - name: sleep
      image: {{ .Values.csiTestPod.image }}
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true
  volumes:
    - name: secrets-store-inline
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: {{ .Values.csiKeyVault.secretProviderClassName }}
  restartPolicy: Always
{{- end }}
