{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.networkPolicy.egressName }}
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: keycloak
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Egress

  egress:
    # Allow Keycloak pod-to-pod clustering (JGroups)
    - to:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        {{- range .Values.networkPolicy.cluster.ports }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}

    # Allow DB access (PostgreSQL CNPG)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.database.namespace }}
          podSelector:
            matchLabels:
              {{- range $key, $value := .Values.networkPolicy.database.podSelector }}
              {{ $key }}: {{ $value | quote }}
              {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.database.port }}

    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dns.namespace }}
          podSelector:
            matchLabels:
              {{- range $key, $value := .Values.networkPolicy.dns.podSelector }}
              {{ $key }}: {{ $value | quote }}
              {{- end }}
      ports:
        - protocol: {{ .Values.networkPolicy.dns.protocol }}
          port: {{ .Values.networkPolicy.dns.port }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.dns.port }}

    # Allow outbound HTTPS
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        {{- range .Values.networkPolicy.external.ports }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
{{- end }}
