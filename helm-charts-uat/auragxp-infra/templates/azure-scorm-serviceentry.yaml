apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: azure-static-web-scorm
  namespace: {{ .Values.namespace }}
spec:
  hosts:
    - {{ .Values.externalServices.scorm.host }}
  ports:
    - number: {{ .Values.externalServices.scorm.port }}
      name: https
      protocol: HTTPS
  resolution: DNS
  location: MESH_EXTERNAL
