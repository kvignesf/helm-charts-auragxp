{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: {{ .Values.istio.destinationRuleName }}
  namespace: {{ .Values.namespace }}
spec:
  host: {{ .Values.appName }}
  trafficPolicy:
    tls:
      mode: {{ .Values.istio.tlsMode }}
{{- end }}
