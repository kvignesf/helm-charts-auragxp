# Application Configuration
replicaCount: 2
appName: auragxp-support-uat
namespace: auragxp-uat

image:
  repository: acrglobalwus.azurecr.io/auragxp/uat/support
  tag: "d8adf0de"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 80
  metricsPort: 9090

resources:
  requests:
    cpu: 25m
    memory: 128Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: 200m
    memory: 256Mi
    ephemeral-storage: 500Mi

# Node selector for pod placement
nodeSelector: {}

# Tolerations for node taints
tolerations: []

# Service Account
serviceAccount:
  name: default
  create: false

# Autoscaling Configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70

# Pod Anti-Affinity
podAntiAffinity:
  enabled: true
  preferredDuringScheduling: true
  weight: 100

# Istio Configuration
istio:
  enabled: true
  destinationRuleName: auragxp-support-uat
  tlsMode: DISABLE

# Network Policy Configuration
networkPolicy:
  enabled: true
  name: auragxp-support-uat-network-policy
  port: 80
  protocol: TCP
  
  # Istio Ingress Configuration
  istioIngress:
    namespace: aks-istio-ingress
    podSelector:
      app: aks-istio-ingressgateway-external
  
  # Auth Proxy Configuration
  authProxy:
    enabled: false
    appName: auth-proxy
  
  # Egress Configuration
  egress:
    allowAll: true
    allowedCIDRs:
      - 0.0.0.0/0

# Pod Annotations
podAnnotations:
  sidecar.istio.io/inject: "true"
  proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"

# Pod Disruption Budget
pdb:
  enabled: true
  minAvailable: 1

# Deployment Strategy
deploymentStrategy:
  type: RollingUpdate
  maxSurge: 1
  maxUnavailable: 0

# Probes Configuration
probes:
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 3
  startupProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30

# Termination Grace Period
terminationGracePeriodSeconds: 30

# Topology Spread Constraints
topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: DoNotSchedule
