apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-operator
  namespace: auragxp-keycloak-uat
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: keycloak-operator
rules:
  # Core resources
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - events
      - serviceaccounts
    verbs: ["*"]

  # Apps resources
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - replicasets
    verbs: ["*"]

  # Batch
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs: ["*"]

  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["*"]

  # Policy (for pod disruption budgets if used)
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["*"]

  # Keycloak CRDs
  - apiGroups: ["k8s.keycloak.org"]
    resources:
      - keycloaks
      - keycloaks/status
      - keycloaks/finalizers
      - keycloakrealmimports
      - keycloakrealmimports/status
      - keycloakrealmimports/finalizers
    verbs: ["*"]

  # Allow watching namespaces (needed by operator-sdk)
  - apiGroups: [""]
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: keycloak-operator
subjects:
  - kind: ServiceAccount
    name: keycloak-operator
    namespace: auragxp-keycloak-uat
roleRef:
  kind: ClusterRole
  name: keycloak-operator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-operator
  namespace: auragxp-keycloak-uat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-operator
  template:
    metadata:
      labels:
        app: keycloak-operator
    spec:
      serviceAccountName: keycloak-operator
      containers:
        - name: keycloak-operator
          image: quay.io/keycloak/keycloak-operator:26.4.7
          imagePullPolicy: IfNotPresent
          env:
            # Watch only this namespace
            - name: WATCH_NAMESPACE
              value: auragxp-keycloak-uat

            # Optional but recommended
            - name: OPERATOR_NAME
              value: keycloak-operator

          resources:
            requests:
              cpu: 50m
              memory: 384Mi
            limits:
              cpu: 200m
              memory: 512Mi

