apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.appName }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Values.appName }}

  template:
    metadata:
      labels:
        app: {{ .Values.appName }}
      annotations:
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
        {{- toYaml .Values.podAnnotations | nindent 8 }}

    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}

      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0

      # Anti-affinity for high availability
      affinity:
        {{- if .Values.podAntiAffinity.enabled }}
        podAntiAffinity:
          {{- if .Values.podAntiAffinity.preferredDuringScheduling }}
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - {{ .Values.appName }}
              topologyKey: kubernetes.io/hostname
          {{- end }}
          {{- if .Values.podAntiAffinity.requiredDuringScheduling }}
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - {{ .Values.appName }}
            topologyKey: kubernetes.io/hostname
          {{- end }}
        {{- end }}

        # Spread pods across nodes evenly
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - {{ .Values.appName }}
              topologyKey: topology.kubernetes.io/zone

      # Topology spread constraints
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: {{ .Values.appName }}
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: {{ .Values.appName }}

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: {{ .Values.appName }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.port }}

          env:
            - name: NODE_ENV
              value: "uat"

            - name: DB_HOST
              value: {{ .Values.database.cluster.readWriteHost | quote }}

            - name: DB_PORT
              value: {{ .Values.database.cluster.port | quote }}

            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}

            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}

          envFrom:
            - secretRef:
                name: {{ .Values.csiKeyVault.syncedK8sSecretName }}

          volumeMounts:
            - name: secrets-store-inline
              mountPath: /mnt/secret
              readOnly: true

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          livenessProbe:
            tcpSocket:
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          startupProbe:
            tcpSocket:
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30

      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.csiKeyVault.secretProviderClassName }}

      terminationGracePeriodSeconds: 60
