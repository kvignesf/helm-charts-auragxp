apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keycloak-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: keycloak
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Egress

  egress:

    - to:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - protocol: TCP
          port: 7800
        - protocol: TCP
          port: 57800

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auragxp-db-devint2
          podSelector:
            matchLabels:
              cnpg.io/cluster: auragxp-db-devint2-cluster
      ports:
        - protocol: TCP
          port: 5432

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
