apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: keycloak
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: keycloak-operator
