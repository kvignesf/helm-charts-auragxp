apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certificate.name }}
  namespace: {{ .Values.istio.gatewayNamespace }}
  {{- if .Values.certificate.reflectorEnabled }}
  annotations:
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: {{ .Values.certificate.reflectorAllowedNamespaces | quote }}
    reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
  {{- end }}
spec:
  secretName: {{ .Values.certificate.secretName }}
  commonName: {{ .Values.certificate.commonName }}
  dnsNames:
    {{- toYaml .Values.certificate.dnsNames | nindent 4 }}
  issuerRef:
    kind: {{ .Values.certificate.issuerRef.kind }}
    name: {{ .Values.certificate.issuerRef.name }}
