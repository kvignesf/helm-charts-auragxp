namespace: auragxp-db-devint2
clusterName: auragxp-db-devint2-cluster

backup:
  dailyDestinationPath: "https://sabackendwus.blob.core.windows.net/cnpg-daily"
  weeklyDestinationPath: "https://sabackendwus.blob.core.windows.net/cnpg-weekly"
  monthlyDestinationPath: "https://sabackendwus.blob.core.windows.net/cnpg-monthly"
  secretName: auragxp-cnpg-devint2-admin-secret
  storageAccount: sabackendwus
  retentionPolicy: "30d"

dailyBackup:
  enabled: true
  name: auragxp-daily-backup
  schedule: "0 0 2 * * *"

weeklyBackup:
  enabled: true
  name: auragxp-weekly-backup
  schedule: "0 0 1 * * 0"
  immediate: true

monthlyBackup:
  enabled: true
  name: auragxp-monthly-backup
  schedule: "0 0 1 1 * *"
  immediate: false

monitoring:
  enabled: true
  alertFor: "5m"
  severity: "warning"

networkPolicy:
  enabled: true
  allowAzureEgress: true
